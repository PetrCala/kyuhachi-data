name: catalog-publish

# The live write. Fires when a prep PR merges to master (decisions / curated hours land).
# A dry_run job runs first; the publish job is gated behind the `production` environment
# (you as required reviewer) and pauses for approval before any Firestore write. Requires
# Workload Identity Federation — inert until repo variables are set (CATALOG_AUTOMATION.md).

on:
  push:
    branches: [master]
    paths:
      - decisions.json
      - data/hours_curated.json
  workflow_dispatch:

permissions:
  contents: write # to push the advanced snapshot.db baseline back to master
  id-token: write # OIDC token for Workload Identity Federation

concurrency:
  group: catalog-publish
  cancel-in-progress: false

jobs:
  # Read-only preview the approver sees in the run before approving the gate.
  dry_run:
    if: ${{ vars.WIF_PROVIDER != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: google-github-actions/auth@v2
        with:
          project_id: kyuhachi-fddcc
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_READONLY }}
          create_credentials_file: true
          export_environment_variables: true
      - uses: google-github-actions/setup-gcloud@v2
      - name: Dry-run preview
        run: |
          set -uo pipefail
          {
            echo "## Catalog publish — dry-run preview"
            echo '### apply.py --decisions'
            echo '```'
            if [ -f decisions.json ]; then
              uv run --python 3.12 python publisher/apply.py --decisions decisions.json 2>&1
            else
              echo "(no decisions.json — only hours will publish)"
            fi
            echo '```'
            echo '### backfill_schedule.py --from-curated'
            echo '```'
            uv run --python 3.12 python publisher/backfill_schedule.py --from-curated 2>&1
            echo '```'
            echo '### backfill_area_id.py (region join)'
            echo '```'
            uv run --python 3.12 python publisher/backfill_area_id.py 2>&1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      # Pre-promote: the curated⊇snapshot coverage invariant is enforced in the
      # publish job AFTER promote. When new onsens are pending it legitimately
      # differs here (curated has them, snapshot doesn't yet), so deselect it.
      - name: Tests (pre-promote)
        run: uv run --python 3.12 --with pytest python -m pytest tests/ --deselect tests/test_publish_schedule.py::test_curated_covers_every_snapshot_onsen

  # Gated live write. `environment: production` pauses for the required reviewer.
  publish:
    needs: dry_run
    if: ${{ vars.WIF_PROVIDER != '' }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - uses: google-github-actions/auth@v2
        with:
          project_id: kyuhachi-fddcc
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_PUBLISH }}
          create_credentials_file: true
          export_environment_variables: true

      - uses: google-github-actions/setup-gcloud@v2

      # Regenerate the staging scrape (gitignored) that `promote` consumes, and refresh
      # the seed/membership. Field values published by apply.py are re-fetched live anyway.
      - name: Detect (regenerate staging)
        run: uv run --python 3.12 python .claude/skills/catalog-sync/catalog_sync.py detect

      # Fail-fast sequence — order matches the catalog-sync runbook (publish before promote).
      - name: Publish fields / fees / retire
        run: |
          set -euo pipefail
          if [ -f decisions.json ]; then
            uv run --python 3.12 python publisher/apply.py --decisions decisions.json --commit
          else
            echo "no decisions.json — skipping field/fee/retire publish"
          fi

      - name: Publish curated hours
        run: uv run --python 3.12 python publisher/backfill_schedule.py --from-curated --commit

      - name: Advance the baseline (promote)
        run: uv run --python 3.12 python .claude/skills/catalog-sync/catalog_sync.py promote --commit

      # Propagate the scraped_at timestamps promote just refreshed into the live
      # dataVerifiedAt freshness cue. apply.py only stamps dataVerifiedAt on
      # materially-changed onsens; this covers the confirmed-unchanged rest of the
      # cycle. Must run AFTER promote (it reads snapshot.db's scraped_at). No-op
      # aware with a monotonic guard — never regresses a fresher live value.
      - name: Backfill dataVerifiedAt (freshness cue)
        run: uv run --python 3.12 python publisher/backfill_data_verified_at.py --commit

      # Propagate region rollups: write the stable areaId (the area-guides join)
      # onto every onsen. apply.py's `add` already sets it on new docs; this covers
      # the confirmed-unchanged rest plus any taxonomy edit in onsen_scraper/regions.py.
      # Post-promote (it reads snapshot.db's area names). No-op aware; bumps
      # catalog_meta only when a value actually changes.
      - name: Backfill areaId (region join)
        run: uv run --python 3.12 python publisher/backfill_area_id.py --commit

      - name: Tests
        run: uv run --python 3.12 --with pytest python -m pytest tests/

      # New onsens ARE published above by apply.py `add` (Publish fields / fees / retire
      # step), but only if this decisions.json's hid already had a minted kyuhachiId in
      # data/onsen-id-map.json going in (catalog-sync Phase 4 mints in the prep PR, before
      # decisions.json merges); apply.py silently skips any hid still missing one. Surface
      # every ADDED hid so a missed mint isn't silently dropped, and as a reminder that the
      # app-repo challenge-pool hand-off is always a separate, manual step regardless.
      - name: Flag ADDED onsens (challenge-pool hand-off pending)
        run: |
          set -uo pipefail
          python3 - <<'PY'
          import glob, json

          reports = sorted(glob.glob("reports/*/changelog.json"))
          added = json.load(open(reports[-1])).get("added", []) if reports else []
          if not added:
              print("no ADDED onsens")
              raise SystemExit(0)

          idmap = json.load(open("data/onsen-id-map.json"))
          minted = [a["hid"] for a in added if str(a["hid"]) in idmap]
          unminted = [a["hid"] for a in added if str(a["hid"]) not in idmap]

          if minted:
              print("::warning::ADDED onsens " + ", ".join(map(str, minted)) +
                    " were minted going in, so apply.py add published their Firestore docs "
                    "above (if decisions.json marked them `add`); the app-repo "
                    "challenge-pool hand-off is still manual.")
          if unminted:
              print("::warning::ADDED onsens " + ", ".join(map(str, unminted)) +
                    " have no kyuhachiId in data/onsen-id-map.json, so apply.py add skipped "
                    "them this run; mint (catalog_sync.py mint --from-staging --commit), "
                    "add a decision, and re-run before they can be published.")
          PY

      # Write-back: the only repo mutation. snapshot.db is NOT in the trigger paths, so
      # this push does not re-trigger the workflow.
      - name: Push advanced snapshot baseline
        run: |
          set -euo pipefail
          if git diff --quiet -- data/snapshot.db; then
            echo "snapshot.db unchanged — nothing to push"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/snapshot.db
            git commit -m "chore(catalog): advance snapshot baseline after publish [skip ci]"
            git push origin HEAD:master
          fi
